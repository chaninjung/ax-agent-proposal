<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AX 제안서 어시스턴트 | 캐럿글로벌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter','Malgun Gothic',-apple-system,sans-serif; height:100vh; display:flex; background:#0f0f0f; color:#e0e0e0; overflow:hidden; }

/* Sidebar */
.sidebar { width:280px; background:#171717; display:flex; flex-direction:column; border-right:1px solid #2a2a2a; }
.sidebar-header { padding:20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #2a2a2a; }
.logo { width:36px; height:36px; background:linear-gradient(135deg, #FF6B2C, #FF8F5E); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.logo-text h2 { font-size:15px; color:#fff; font-weight:600; }
.logo-text p { font-size:11px; color:#666; font-weight:400; }
.new-chat-btn { margin:16px; padding:12px; background:transparent; color:#fff; border:1px solid #333; border-radius:10px; cursor:pointer; font-size:13px; font-weight:500; transition:all 0.2s; display:flex; align-items:center; gap:8px; justify-content:center; }
.new-chat-btn:hover { background:#222; border-color:#555; }
.chat-list { flex:1; overflow-y:auto; padding:8px 12px; }
.chat-list::-webkit-scrollbar { width:4px; }
.chat-list::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }
.chat-item { padding:12px 14px; border-radius:10px; cursor:pointer; font-size:13px; color:#999; transition:all 0.15s; margin-bottom:2px; display:flex; flex-direction:column; }
.chat-item:hover { background:#1e1e1e; color:#ccc; }
.chat-item.active { background:#262626; color:#FF6B2C; }
.chat-item .title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-item .time { font-size:10px; color:#555; margin-top:4px; }
.chat-item .delete-btn { display:none; color:#666; font-size:11px; cursor:pointer; margin-top:4px; }
.chat-item:hover .delete-btn { display:block; }
.chat-item .delete-btn:hover { color:#ff4444; }
.sidebar-footer { padding:16px 20px; border-top:1px solid #2a2a2a; font-size:11px; color:#555; }

/* Main */
.main { flex:1; display:flex; flex-direction:column; background:#0f0f0f; }
.main-header { padding:16px 32px; background:#171717; border-bottom:1px solid #2a2a2a; display:flex; align-items:center; justify-content:space-between; }
.main-header h1 { font-size:15px; color:#fff; font-weight:600; }
.header-badges { display:flex; gap:8px; }
.badge { font-size:11px; background:#1e1e1e; color:#888; padding:4px 10px; border-radius:6px; border:1px solid #2a2a2a; }
.badge.model { color:#FF6B2C; border-color:#FF6B2C33; }

/* Messages */
.messages { flex:1; overflow-y:auto; padding:32px; max-width:800px; width:100%; margin:0 auto; }
.messages::-webkit-scrollbar { width:6px; }
.messages::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
.msg { margin-bottom:28px; animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg .meta { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.msg .avatar { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.msg.bot .avatar { background:linear-gradient(135deg,#FF6B2C,#FF8F5E); color:#fff; }
.msg.user .avatar { background:#333; color:#fff; }
.msg .name { font-size:13px; font-weight:600; color:#ccc; }
.msg.bot .name { color:#FF6B2C; }
.msg .content { padding:0 0 0 36px; font-size:14px; line-height:1.8; color:#d0d0d0; }
.msg.user .content { color:#e0e0e0; background:#1a1a1a; padding:14px 18px; border-radius:12px; margin-left:36px; }

/* Markdown styles */
.msg .content table { border-collapse:collapse; margin:12px 0; width:100%; border-radius:8px; overflow:hidden; display:block; overflow-x:auto; }
.msg .content th, .msg .content td { border:1px solid #333; padding:8px 12px; font-size:12px; text-align:left; white-space:nowrap; min-width:80px; }
.msg .content th { background:#1a1a1a; color:#FF6B2C; font-weight:600; position:sticky; top:0; }
.msg .content td { background:#111; }
.msg .content strong { color:#FF8F5E; }
.msg .content code { background:#1a1a1a; padding:2px 6px; border-radius:4px; font-size:13px; color:#FF8F5E; font-family:'Consolas',monospace; }
.msg .content h3 { margin:16px 0 8px; color:#fff; font-size:15px; font-weight:600; }
.msg .content h2 { margin:16px 0 8px; color:#fff; font-size:16px; font-weight:700; }
.msg .content ul, .msg .content ol { padding-left:24px; margin:8px 0; }
.msg .content li { margin:4px 0; }
.msg .content hr { border:none; border-top:1px solid #2a2a2a; margin:16px 0; }
.msg .content a { color:#FF6B2C; text-decoration:none; }
.msg .content a:hover { text-decoration:underline; }
.msg .content blockquote { border-left:3px solid #FF6B2C; padding:8px 16px; margin:8px 0; background:#1a1a1a; border-radius:0 8px 8px 0; color:#aaa; }

/* Typing */
.typing { display:inline-flex; gap:5px; padding:4px 0; }
.typing span { width:7px; height:7px; background:#FF6B2C; border-radius:50%; animation:bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay:0.2s; }
.typing span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

/* Input */
.input-area { padding:20px 32px 24px; max-width:800px; width:100%; margin:0 auto; }
.input-wrap { display:flex; gap:8px; align-items:flex-end; background:#171717; border:1px solid #2a2a2a; border-radius:14px; padding:8px 8px 8px 20px; transition:border-color 0.2s; }
.input-wrap:focus-within { border-color:#FF6B2C55; box-shadow:0 0 0 3px #FF6B2C11; }
.input-wrap textarea { flex:1; background:none; border:none; outline:none; color:#e0e0e0; font-size:14px; padding:6px 0; font-family:inherit; resize:none; max-height:120px; line-height:1.5; }
.input-wrap textarea::placeholder { color:#555; }
.send-btn { width:38px; height:38px; background:#FF6B2C; border:none; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
.send-btn:hover { background:#e55a1b; transform:scale(1.05); }
.send-btn:disabled { background:#333; cursor:not-allowed; transform:none; }
.send-btn svg { fill:#fff; width:18px; height:18px; }
.input-hint { text-align:center; font-size:11px; color:#444; margin-top:8px; }

/* Welcome */
.welcome { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; max-width:600px; margin:0 auto; }
.welcome-icon { width:64px; height:64px; background:linear-gradient(135deg,#FF6B2C,#FF8F5E); border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:32px; margin-bottom:20px; box-shadow:0 8px 32px #FF6B2C22; }
.welcome h2 { font-size:22px; color:#fff; margin-bottom:6px; font-weight:700; }
.welcome p { color:#666; font-size:14px; margin-bottom:32px; }
.suggestions { display:flex; flex-direction:column; gap:10px; width:100%; }
.suggestion { padding:14px 18px; background:#171717; border:1px solid #2a2a2a; border-radius:12px; color:#aaa; font-size:13px; cursor:pointer; transition:all 0.2s; text-align:left; }
.suggestion:hover { border-color:#FF6B2C55; color:#FF6B2C; background:#1a1a1a; }
.suggestion::before { content:"→ "; color:#FF6B2C; }

/* Responsive */
@media (max-width:768px) {
  .sidebar { display:none; }
  .messages, .input-area { padding-left:16px; padding-right:16px; }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">🥕</div>
    <div class="logo-text">
      <h2>캐럿글로벌</h2>
      <p>AX 제안서 어시스턴트</p>
    </div>
  </div>
  <button class="new-chat-btn" onclick="newChat()">✦ 새 대화 시작</button>
  <div class="chat-list" id="chatList"></div>
  <div class="sidebar-footer">Powered by Dify + Claude</div>
</div>

<div class="main">
  <div class="main-header">
    <h1 id="headerTitle">새 대화</h1>
    <div class="header-badges">
      <span class="badge model">Claude Sonnet 4</span>
      <span class="badge">Dify Agent</span>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" rows="1" placeholder="메시지를 입력하세요..." onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</div>
  </div>
</div>

<script>
const DIFY_API = "https://api.dify.ai/v1/chat-messages";
const DIFY_KEY = "app-424rkWacx9iO1gV3iPmDRjq0";

let conversations = JSON.parse(localStorage.getItem("ax_convos") || "[]");
let currentConvo = null;
let isStreaming = false;

function init() {
  renderChatList();
  if (conversations.length > 0) {
    loadConvo(conversations[0].id);
  }
  autoResize(document.getElementById("userInput"));
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.addEventListener("input", () => {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  });
}

function newChat() {
  const convo = {
    id: "c_" + Date.now(),
    title: "새 대화",
    difyConvoId: "",
    messages: [],
    createdAt: new Date().toLocaleString("ko-KR", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" })
  };
  conversations.unshift(convo);
  save();
  loadConvo(convo.id);
}

function deleteConvo(id, e) {
  e.stopPropagation();
  conversations = conversations.filter(c => c.id !== id);
  save();
  if (currentConvo && currentConvo.id === id) {
    currentConvo = null;
    if (conversations.length > 0) loadConvo(conversations[0].id);
    else renderMessages();
  }
  renderChatList();
}

function loadConvo(id) {
  currentConvo = conversations.find(c => c.id === id);
  document.getElementById("headerTitle").textContent = currentConvo ? currentConvo.title : "새 대화";
  renderChatList();
  renderMessages();
}

function renderChatList() {
  const list = document.getElementById("chatList");
  list.innerHTML = conversations.map(c =>
    `<div class="chat-item ${currentConvo && currentConvo.id === c.id ? 'active' : ''}" onclick="loadConvo('${c.id}')">
      <div class="title">${escapeHtml(c.title)}</div>
      <div class="time">${c.createdAt}</div>
      <div class="delete-btn" onclick="deleteConvo('${c.id}', event)">삭제</div>
    </div>`
  ).join("");
}

function renderMessages() {
  const el = document.getElementById("messages");
  if (!currentConvo || currentConvo.messages.length === 0) {
    el.innerHTML = `<div class="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>무엇을 도와드릴까요?</h2>
      <p>AI 교육 제안서, 교육자료, 커리큘럼을 만들어 드립니다</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion(this)">대상그룹 청정원 AI 리터러시 교육 제안서 만들어줘</div>
        <div class="suggestion" onclick="sendSuggestion(this)">현대엔지니어링 실무자 대상 생성형 AI 활용 교육자료</div>
        <div class="suggestion" onclick="sendSuggestion(this)">GS리테일 전사 AI 업무 자동화 커리큘럼 설계해줘</div>
      </div>
    </div>`;
    return;
  }
  el.innerHTML = currentConvo.messages.map(m => `
    <div class="msg ${m.role}">
      <div class="meta">
        <div class="avatar">${m.role === "bot" ? "🤖" : "👤"}</div>
        <div class="name">${m.role === "bot" ? "AX 어시스턴트" : "나"}</div>
      </div>
      <div class="content">${m.role === "bot" ? formatMarkdown(m.text) : escapeHtml(m.text)}</div>
    </div>
  `).join("");
  el.scrollTop = el.scrollHeight;
}

function formatMarkdown(text) {
  // Remove thinking tags from Haiku
  text = text.replace(/<think>[\s\S]*?<\/think>/g, '').trim();

  // If text contains raw HTML tags (from Dify), extract and preserve them
  const htmlBlocks = [];
  let processed = text.replace(/<a\s[^>]*>.*?<\/a>/gi, (match) => {
    htmlBlocks.push(match);
    return `__HTML_BLOCK_${htmlBlocks.length - 1}__`;
  });

  let html = escapeHtml(processed);

  // Restore HTML blocks
  htmlBlocks.forEach((block, i) => {
    // Make download links styled as buttons
    let styled = block.replace(/<a\s/g, '<a style="display:inline-block;background:#FF6B2C;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:600;margin:8px 0;" ');
    html = html.replace(`__HTML_BLOCK_${i}__`, styled);
  });

  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
  html = html.replace(/^---$/gm, '<hr>');
  html = html.replace(/`(.*?)`/g, '<code>$1</code>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#FF6B2C;">$1</a>');
  html = html.replace(/\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)*)/g, (match, header, body) => {
    const ths = header.split('|').filter(s=>s.trim()).map(s=>`<th>${s.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      const tds = row.split('|').filter(s=>s.trim()).map(s=>`<td>${s.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });
  html = html.replace(/^- (.*?)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*?<\/li>\s*)+)/gs, '<ul>$1</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');
  html = html.replace(/\n/g, '<br>');
  html = html.replace(/<br><br>/g, '<br>');
  html = html.replace(/<br>(<h[23]>)/g, '$1');
  html = html.replace(/(<\/h[23]>)<br>/g, '$1');
  html = html.replace(/<br>(<table>)/g, '$1');
  html = html.replace(/(<\/table>)<br>/g, '$1');
  html = html.replace(/<br>(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)<br>/g, '$1');
  html = html.replace(/<br>(<hr>)/g, '$1');
  html = html.replace(/(<hr>)<br>/g, '$1');
  return html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function sendSuggestion(el) {
  if (!currentConvo) newChat();
  document.getElementById("userInput").value = el.textContent.replace("→ ", "");
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text || isStreaming) return;

  if (!currentConvo) newChat();

  currentConvo.messages.push({ role: "user", text });
  if (currentConvo.title === "새 대화") {
    currentConvo.title = text.substring(0, 35) + (text.length > 35 ? "..." : "");
    document.getElementById("headerTitle").textContent = currentConvo.title;
  }
  save();
  renderMessages();
  renderChatList();
  input.value = "";
  input.style.height = "auto";

  const msgEl = document.getElementById("messages");
  const typingDiv = document.createElement("div");
  typingDiv.className = "msg bot";
  typingDiv.innerHTML = `<div class="meta"><div class="avatar">🤖</div><div class="name">AX 어시스턴트</div></div><div class="content"><div class="typing"><span></span><span></span><span></span></div><div style="font-size:12px;color:#666;margin-top:6px;">응답을 생성하고 있습니다...</div></div>`;
  msgEl.appendChild(typingDiv);
  msgEl.scrollTop = msgEl.scrollHeight;

  isStreaming = true;
  document.getElementById("sendBtn").disabled = true;

  try {
    const resp = await fetch(DIFY_API, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${DIFY_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        inputs: {},
        query: text,
        response_mode: "streaming",
        conversation_id: currentConvo.difyConvoId || "",
        user: "web-user"
      })
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let botText = "";
    let buffer = "";

    typingDiv.querySelector(".content").innerHTML = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop() || "";

      for (const line of lines) {
        if (line.startsWith("data: ")) {
          try {
            const d = JSON.parse(line.substring(6));
            if (d.event === "agent_message" || d.event === "message") {
              botText += d.answer || "";
              var displayText = botText.replace(/<think>[\s\S]*?<\/think>/g, '').replace(/<think>[\s\S]*/g, '').trim();
              if (displayText) {
                typingDiv.querySelector(".content").innerHTML = formatMarkdown(displayText);
                msgEl.scrollTop = msgEl.scrollHeight;
              }
            }
            if (d.event === "error") {
              botText = "⚠️ 오류가 발생했습니다: " + (d.message || "알 수 없는 오류") + "\n\n잠시 후 다시 시도해주세요.";
              typingDiv.querySelector(".content").innerHTML = formatMarkdown(botText);
            }
            if (d.conversation_id) {
              currentConvo.difyConvoId = d.conversation_id;
            }
          } catch(e) {}
        }
      }
    }

    if (!botText) botText = "⚠️ 응답을 받지 못했습니다. 잠시 후 다시 시도해주세요.";
    currentConvo.messages.push({ role: "bot", text: botText });
    save();
    renderMessages();
  } catch(e) {
    typingDiv.querySelector(".content").innerHTML = "⚠️ 네트워크 오류가 발생했습니다. 다시 시도해주세요.";
    currentConvo.messages.push({ role: "bot", text: "⚠️ 네트워크 오류가 발생했습니다." });
    save();
    console.error(e);
  }

  isStreaming = false;
  document.getElementById("sendBtn").disabled = false;
  document.getElementById("userInput").focus();
}

function save() {
  localStorage.setItem("ax_convos", JSON.stringify(conversations));
}

init();
</script>
</body>
</html>
